<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SiteScout Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FAFAFA;
      color: #0D0D0D;
      padding: 40px;
      max-width: 560px;
      margin: 0 auto;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 32px;
    }

    .section {
      background: white;
      border: 1px solid #E5E5E5;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .section h2 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .section .desc {
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #555;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #E5E5E5;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      margin-bottom: 16px;
      transition: border-color 0.15s;
    }

    input:focus {
      outline: none;
      border-color: #0D0D0D;
    }

    .save-btn {
      padding: 12px 32px;
      background: #0D0D0D;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .save-btn:hover { background: #222; }

    .saved-msg {
      display: inline-block;
      margin-left: 12px;
      font-size: 13px;
      color: #38A169;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .saved-msg.visible { opacity: 1; }
  </style>
</head>
<body>
  <h1>SiteScout</h1>
  <p class="subtitle">by Create & Source</p>

  <div class="section">
    <h2>AI Analysis</h2>
    <p class="desc">Claude API key for analyzing businesses and generating Lovable prompts.</p>
    <label for="claudeKey">Claude API Key</label>
    <input type="password" id="claudeKey" placeholder="sk-ant-...">
  </div>

  <div class="section">
    <h2>CRM Connection</h2>
    <p class="desc">Connect to your SiteScout CRM dashboard to sync leads.</p>
    <label for="crmUrl">CRM API URL</label>
    <input type="text" id="crmUrl" placeholder="https://sitescout-crm.vercel.app">
    <label for="apiKey">API Key</label>
    <input type="password" id="apiKey" placeholder="Your CRM API key">
  </div>

  <div class="section">
    <h2>Lovable</h2>
    <p class="desc">Your Lovable account for auto-building sites.</p>
    <label for="lovableEmail">Lovable Account Email</label>
    <input type="text" id="lovableEmail" placeholder="you@email.com">
  </div>

  <button class="save-btn" id="saveBtn">Save Settings</button>
  <span class="saved-msg" id="savedMsg">Settings saved</span>

  <script src="options.js"></script>
</body>
</html>
